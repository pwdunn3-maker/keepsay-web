<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset your password — Keepsay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #1B4332;
      --gold: #D4A843;
      --cream: #F9F6F0;
      --text: #1A1A1A;
      --text-secondary: #6B6B6B;
      --border: rgba(0,0,0,0.08);
      --surface: #ffffff;
      --error: #E24B4A;
      --success: #1B4332;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }
    nav {
      background: rgba(250,250,246,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 0.5px solid var(--border);
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
    }
    .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-logo-icon { width: 32px; height: 32px; border-radius: 8px; overflow: hidden; }
    .nav-logo-icon img { width: 100%; height: 100%; object-fit: cover; }
    .nav-logo-name { font-size: 17px; font-weight: 600; color: var(--text); letter-spacing: -0.3px; }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .card {
      background: var(--surface);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 2px 24px rgba(0,0,0,0.07);
    }

    .card-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .card-icon {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      overflow: hidden;
      margin: 0 auto 16px;
    }
    .card-icon img { width: 100%; height: 100%; object-fit: cover; }

    .card-title {
      font-family: 'Lora', serif;
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }
    .card-sub {
      font-size: 15px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .form { display: flex; flex-direction: column; gap: 14px; }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 13px; font-weight: 500; color: var(--text-secondary); }
    .field input {
      background: var(--cream);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 16px;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }
    .field input:focus { border-color: var(--green); }

    .strength-bar {
      height: 4px;
      border-radius: 2px;
      background: #E0E0E0;
      margin-top: 6px;
      overflow: hidden;
    }
    .strength-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s, background 0.3s;
      width: 0%;
    }
    .strength-label {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    .submit-btn {
      background: var(--gold);
      color: var(--green);
      border: none;
      border-radius: 50px;
      padding: 16px;
      font-size: 16px;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      width: 100%;
      margin-top: 8px;
      transition: opacity 0.2s;
    }
    .submit-btn:hover { opacity: 0.9; }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .message {
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 14px;
      line-height: 1.5;
      display: none;
    }
    .message.error { background: #FEF2F2; color: var(--error); border: 1px solid rgba(226,75,74,0.2); }
    .message.success { background: #E8F0EB; color: var(--green); border: 1px solid rgba(27,67,50,0.2); }
    .message.show { display: block; }

    .back-link {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: var(--text-secondary);
    }
    .back-link a { color: var(--green); text-decoration: none; font-weight: 500; }
    .back-link a:hover { text-decoration: underline; }

    .loading-spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(27,67,50,0.3);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Success state */
    .success-state { display: none; text-align: center; }
    .success-state.show { display: block; }
    .success-icon { font-size: 48px; margin-bottom: 16px; }
    .success-title { font-family: 'Lora', serif; font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 10px; }
    .success-body { font-size: 15px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 24px; }
    .open-app-btn {
      display: inline-block;
      background: var(--green);
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      padding: 14px 32px;
      border-radius: 50px;
    }
  </style>
</head>
<body>
  <nav>
    <a href="https://www.getkeepsay.com" class="nav-logo">
      <div class="nav-logo-icon">
        <img src="/icon.png" alt="Keepsay" onerror="this.style.display='none'">
      </div>
      <span class="nav-logo-name">Keepsay</span>
    </a>
  </nav>

  <main>
    <div class="card">

      <!-- Form state -->
      <div id="form-state">
        <div class="card-header">
          <div class="card-icon">
            <img src="/icon.png" alt="Keepsay">
          </div>
          <h1 class="card-title">Reset your password</h1>
          <p class="card-sub">Choose a new password for your Keepsay account.</p>
        </div>

        <div class="message" id="message"></div>

        <form class="form" id="reset-form">
          <div class="field">
            <label for="password">New password</label>
            <input
              type="password"
              id="password"
              placeholder="At least 8 characters"
              autocomplete="new-password"
              oninput="checkStrength(this.value)"
              required
            />
            <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
            <div class="strength-label" id="strength-label"></div>
          </div>

          <div class="field">
            <label for="confirm">Confirm new password</label>
            <input
              type="password"
              id="confirm"
              placeholder="Re-enter your new password"
              autocomplete="new-password"
              required
            />
          </div>

          <button type="submit" class="submit-btn" id="submit-btn">Set new password</button>
        </form>
      </div>

      <!-- Success state -->
      <div class="success-state" id="success-state">
        <div class="success-icon">✅</div>
        <div class="success-title">Password updated!</div>
        <p class="success-body">Your Keepsay password has been reset. Open the app and sign in with your new password.</p>
        <a href="https://www.getkeepsay.com" class="open-app-btn">Back to Keepsay</a>
      </div>

    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://amijtfctukogekemryjq.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFtaWp0ZmN0dWtvZ2VrZW1yeWpxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMzM3NzAsImV4cCI6MjA5MTcwOTc3MH0.IvyqU5Ep5aJz5HNhqcf30ofBL-7JoCl0DLU3zcqYHcc';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function checkStrength(val) {
      const fill = document.getElementById('strength-fill');
      const label = document.getElementById('strength-label');
      if (!val) { fill.style.width = '0%'; label.textContent = ''; return; }
      let score = 0;
      if (val.length >= 8) score++;
      if (val.length >= 12) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      const levels = [
        { w: '20%', color: '#E24B4A', text: 'Too short' },
        { w: '40%', color: '#E24B4A', text: 'Weak' },
        { w: '60%', color: '#F59E0B', text: 'Fair' },
        { w: '80%', color: '#10B981', text: 'Good' },
        { w: '100%', color: '#1B4332', text: 'Strong' },
      ];
      const level = levels[Math.min(score, 4)];
      fill.style.width = level.w;
      fill.style.background = level.color;
      label.textContent = level.text;
      label.style.color = level.color;
    }

    function showMessage(text, type) {
      const el = document.getElementById('message');
      el.textContent = text;
      el.className = 'message ' + type + ' show';
    }

    function showSuccess() {
      document.getElementById('form-state').style.display = 'none';
      document.getElementById('success-state').classList.add('show');
    }

    // Extract tokens from URL hash
    function getHashParams() {
      const hash = window.location.hash.substring(1);
      return Object.fromEntries(hash.split('&').map(p => p.split('=')));
    }

    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      const btn = document.getElementById('submit-btn');

      if (password.length < 8) {
        showMessage('Password must be at least 8 characters.', 'error');
        return;
      }
      if (password !== confirm) {
        showMessage('Passwords don\'t match. Please try again.', 'error');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="loading-spinner"></span>Updating password...';

      try {
        // Get session from URL hash tokens
        const params = getHashParams();
        if (params.access_token) {
          await supabase.auth.setSession({
            access_token: params.access_token,
            refresh_token: params.refresh_token || '',
          });
        }

        const { error } = await supabase.auth.updateUser({ password });
        if (error) throw error;
        showSuccess();
      } catch (err) {
        showMessage(err.message || 'Something went wrong. Please request a new reset link.', 'error');
        btn.disabled = false;
        btn.textContent = 'Set new password';
      }
    });

    // Check if we have a valid reset token on load
    window.addEventListener('load', () => {
      const params = getHashParams();
      if (!params.access_token && !params.type) {
        showMessage('This reset link is invalid or has expired. Please request a new one from the Keepsay app.', 'error');
        document.getElementById('submit-btn').disabled = true;
      }
    });
  </script>
</body>
</html>
